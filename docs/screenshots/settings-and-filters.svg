<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-label="JobPulse settings and filters">
  <rect width="1400" height="840" fill="#f8fafc"/>
  <rect x="52" y="42" width="1296" height="756" rx="18" fill="#ffffff" stroke="#d1d5db"/>
  <text x="84" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#111827" font-weight="700">Settings & Filters</text>
  <rect x="84" y="126" width="1240" height="2" fill="#e5e7eb"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#111827">
    <text x="98" y="178" font-weight="700">Include Keywords</text>
    <rect x="98" y="192" width="560" height="46" rx="8" fill="#f9fafb" stroke="#cbd5e1"/>
    <text x="114" y="222" fill="#6b7280">machine learning, ai, llm</text>

    <text x="98" y="288" font-weight="700">Exclude Keywords</text>
    <rect x="98" y="302" width="560" height="46" rx="8" fill="#f9fafb" stroke="#cbd5e1"/>
    <text x="114" y="332" fill="#6b7280">intern, unpaid, contract</text>

    <text x="98" y="398" font-weight="700">Recency</text>
    <rect x="98" y="412" width="220" height="46" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="114" y="442" fill="#1d4ed8">Last 1 day</text>

    <text x="98" y="508" font-weight="700">Max Jobs</text>
    <rect x="98" y="522" width="220" height="46" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="114" y="552" fill="#1d4ed8">20</text>
  </g>
  <rect x="736" y="178" width="588" height="430" rx="12" fill="#f9fafb" stroke="#cbd5e1"/>
  <text x="760" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#111827" font-weight="700">Location Policy</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">
    <text x="760" y="262">1. Seattle / Bay Area / San Francisco prioritized</text>
    <text x="760" y="296">2. US-only fallback</text>
    <text x="760" y="330">3. LinkedIn-only direct job links</text>
    <text x="760" y="364">4. Top 20 ranked daily</text>
    <text x="760" y="398">5. Email digest with match reasons</text>
  </g>
  <rect x="98" y="658" width="260" height="56" rx="10" fill="#111827"/>
  <text x="145" y="695" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="700">Save Settings</text>
</svg>
